<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081914"/>
      <stop offset="55%" stop-color="#0E2820"/>
      <stop offset="100%" stop-color="#143A30"/>
    </linearGradient>
    <radialGradient id="og-glow-green" cx="0.15" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#0D5A48" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0D5A48" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-glow-gold" cx="0.85" cy="0.9" r="0.6">
      <stop offset="0%" stop-color="#E0B060" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E0B060" stop-opacity="0"/>
    </radialGradient>
    <pattern id="og-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#25504A" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#og-sky)"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <rect width="1200" height="630" fill="url(#og-glow-green)"/>
  <rect width="1200" height="630" fill="url(#og-glow-gold)"/>

  <line x1="0" y1="460" x2="1200" y2="460" stroke="#60A050" stroke-width="1.4" opacity="0.5"/>

  <!-- Headline -->
  <text x="90" y="260" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="56" font-weight="600" fill="#F4F1E8" letter-spacing="-1.6">Tabyn</text>
  <text x="90" y="340" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="58" font-weight="600" fill="#F4F1E8" letter-spacing="-1.6">Инвестиции в</text>
  <text x="90" y="410" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="58" font-weight="600" fill="#E0B060" letter-spacing="-1.6">животноводство</text>

  <text x="90" y="470" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="22" fill="#C4CEC7">Проверенные фермеры · документированные активы · Казахстан</text>

  <!-- Metric chips -->
  <g transform="translate(90, 520)">
    <rect width="240" height="68" rx="14" fill="#0D2620" stroke="#25504A"/>
    <text x="20" y="28" font-family="monospace" font-size="11" fill="#8FA199" letter-spacing="2">ПРОВЕРЕННЫХ ФЕРМЕРОВ</text>
    <text x="20" y="56" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="24" font-weight="600" fill="#F4F1E8">85+</text>
  </g>
  <g transform="translate(350, 520)">
    <rect width="240" height="68" rx="14" fill="#0D2620" stroke="#25504A"/>
    <text x="20" y="28" font-family="monospace" font-size="11" fill="#8FA199" letter-spacing="2">СРЕДНИЙ ДОХОД</text>
    <text x="20" y="56" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="24" font-weight="600" fill="#E0B060">18%</text>
  </g>
  <g transform="translate(610, 520)">
    <rect width="240" height="68" rx="14" fill="#0D2620" stroke="#25504A"/>
    <text x="20" y="28" font-family="monospace" font-size="11" fill="#8FA199" letter-spacing="2">АКТИВНЫХ ЛОТОВ</text>
    <text x="20" y="56" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="24" font-weight="600" fill="#60A050">430+</text>
  </g>

  <!-- Right-side brand ring hint — evokes the logo composition -->
  <g transform="translate(900, 210)" opacity="0.95">
    <circle cx="130" cy="130" r="120" fill="none" stroke="#0D5A48" stroke-width="10"/>
    <circle cx="130" cy="130" r="120" fill="none" stroke="#60A050" stroke-width="6" stroke-dasharray="160 500" transform="rotate(-30 130 130)"/>
    <circle cx="130" cy="130" r="90" fill="#12302A" stroke="#25504A" stroke-width="1"/>
    <text x="130" y="140" text-anchor="middle" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="32" font-weight="700" fill="#E0B060">tabyn</text>
  </g>

  <g stroke="#8FA199" stroke-width="1" fill="none" opacity="0.4">
    <path d="M30,30 L30,54 M30,30 L54,30"/>
    <path d="M1170,30 L1170,54 M1170,30 L1146,30"/>
    <path d="M30,600 L30,576 M30,600 L54,600"/>
    <path d="M1170,600 L1170,576 M1170,600 L1146,600"/>
  </g>
</svg>
