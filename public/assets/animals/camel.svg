<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Bactrian camel — schematic livestock asset">
  <defs>
    <linearGradient id="sky-camel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1D19"/>
      <stop offset="100%" stop-color="#152521"/>
    </linearGradient>
    <linearGradient id="land-camel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C2F29"/>
      <stop offset="100%" stop-color="#0E1D19"/>
    </linearGradient>
    <pattern id="grid-camel" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#294139" stroke-width="0.6" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="800" height="320" fill="url(#sky-camel)"/>
  <rect width="800" height="500" fill="url(#grid-camel)" opacity="0.7"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#4FA26D" stroke-width="1.2" opacity="0.55"/>
  <rect y="320" width="800" height="180" fill="url(#land-camel)"/>

  <!-- Bactrian camel — two humps, long neck -->
  <g transform="translate(180, 120)" fill="#F4F1E8" opacity="0.92">
    <!-- Body with two humps -->
    <path d="M40,160 C22,162 12,154 10,140 C8,124 22,112 42,112
             C50,90 70,76 96,82
             C100,60 112,48 128,50 C140,52 148,66 146,80
             C162,66 180,58 196,62 C216,66 228,80 222,98
             C240,108 242,124 232,136
             C240,142 242,154 234,160 L238,160 
             C248,160 254,170 250,180 L48,180 C40,180 36,172 40,160 Z"/>
    <!-- Neck extending up-right -->
    <path d="M230,98 C244,80 256,58 260,38 C262,28 258,20 248,20 C238,22 230,34 228,46 C226,60 226,80 232,96 Z"/>
    <!-- Head -->
    <ellipse cx="256" cy="26" rx="14" ry="10"/>
    <!-- Muzzle -->
    <ellipse cx="268" cy="32" rx="6" ry="4"/>
    <!-- Ears -->
    <ellipse cx="250" cy="14" rx="3" ry="6" transform="rotate(-20 250 14)"/>
    <!-- Eye -->
    <circle cx="258" cy="24" r="1.5" fill="#07130F"/>
    <!-- Legs — longer than sheep/goat -->
    <rect x="62" y="180" width="8" height="48"/>
    <rect x="98" y="180" width="8" height="48"/>
    <rect x="178" y="180" width="8" height="48"/>
    <rect x="214" y="180" width="8" height="48"/>
    <!-- Tail -->
    <path d="M36,160 L20,158 L26,170 Z"/>
  </g>

  <!-- Reticle -->
  <g stroke="#4FA26D" stroke-width="0.9" fill="none" opacity="0.9">
    <line x1="130" y1="120" x2="130" y2="340"/>
    <line x1="120" y1="120" x2="140" y2="120"/>
    <line x1="120" y1="340" x2="140" y2="340"/>
  </g>
  <g stroke="#4FA26D" stroke-width="0.9" fill="none" opacity="0.9">
    <line x1="190" y1="360" x2="560" y2="360"/>
    <line x1="190" y1="350" x2="190" y2="370"/>
    <line x1="560" y1="350" x2="560" y2="370"/>
  </g>

  <!-- Corner marks -->
  <g stroke="#8A938D" stroke-width="1" fill="none" opacity="0.6">
    <path d="M18,18 L18,36 M18,18 L36,18"/>
    <path d="M782,18 L782,36 M782,18 L764,18"/>
    <path d="M18,482 L18,464 M18,482 L36,482"/>
    <path d="M782,482 L782,464 M782,482 L764,482"/>
  </g>

  <text x="50" y="470" font-family="monospace" font-size="11" fill="#8A938D" letter-spacing="3">CAMEL · CAMELUS BACTRIANUS</text>
</svg>
